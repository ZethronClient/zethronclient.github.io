<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title translate="no">Zethron Client - Kayıt Ol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goldman&family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Ekranı ikiye bölen gelişmiş login/register stili */
.auth-container {
    display: flex;
    min-height: 100vh;
    background: #020309;
}
/* Sol taraftaki fantastik görsel alan */
.auth-banner-side {
    flex: 1;
    background: linear-gradient(135px, rgba(5,8,22,0.85), rgba(0,0,0,0.5)), url('../assets/bg.jpg');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
    border-right: 2px solid #3b82f6;
}
@media (max-width: 768px) { .auth-banner-side { display: none; } }

/* Sağ taraftaki form alanı */
.auth-form-side {
    width: 500px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000000;
    padding: 40px;
}
.auth-card { width: 100%; max-width: 380px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Kayıt Ol</h2>
            <form id="register-form">
                <div class="input-group">
                    <input type="text" id="register-username" placeholder="Kullanıcı Adı (Oyuncu Adı)" required>
                </div>
                <div class="input-group">
                    <input type="email" id="register-email" placeholder="E-posta Adresi" required>
                </div>
                <div class="input-group">
                    <input type="password" id="register-password" placeholder="Şifre" required>
                </div>
                <button type="submit" class="auth-btn">Hesap Oluştur</button>
            </form>
            <p>Zaten bir hesabın var mı? <a href="login.html">Giriş Yap</a></p>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>

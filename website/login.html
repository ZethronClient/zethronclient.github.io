<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title translate="no">Zethron Client - Giriş Yap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Goldman&family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
            background: #020309;
        }
        .auth-banner-side {
            flex: 1;
            background: linear-gradient(135px, rgba(5,8,22,0.85), rgba(0,0,0,0.5)), url('../assets/bg.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            border-right: 2px solid #3b82f6;
        }
        @media (max-width: 768px) { .auth-banner-side { display: none; } }
        
        .auth-form-side {
            width: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            padding: 40px;
        }
        .auth-card { width: 100%; max-width: 380px; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Giriş Yap</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="login-email" placeholder="E-posta Adresi" required>
                </div>
                <div class="input-group">
                    <input type="password" id="login-password" placeholder="Şifre" required>
                </div>
                <button type="submit" class="auth-btn">Oturum Aç</button>
            </form>
            <p>Hesabın yok mu? <a href="register.html">Kayıt Ol</a></p>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
